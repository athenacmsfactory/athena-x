name: 🔱 Athena Monorepo Publisher

on:
  workflow_dispatch:
    inputs:
      sites:
        description: 'Site(s) om te publiceren (spatie-gescheiden, bv. "karel-portfolio-ath"). Leeg = alle sites.'
        required: false
        default: ''
      run_audit:
        description: 'Lighthouse Audit uitvoeren?'
        type: boolean
        default: false
  push:
    paths:
      - 'sites/**'
    branches:
      - main

jobs:
  # STAP 1: Detecteer welke sites gewijzigd zijn
  discovery:
    runs-on: ubuntu-latest
    outputs:
      sites: ${{ steps.set-sites.outputs.sites }}
      any_changed: ${{ steps.set-sites.outputs.any_changed }}
    steps:
      - name: 🛰️ Checkout Monorepo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # Genoeg om diff te zien

      - name: 🔍 Detect Changed Sites
        id: set-sites
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            INPUT_SITES="${{ github.event.inputs.sites }}"
            if [ -n "$INPUT_SITES" ]; then
              # Split by space, trim whitespace
              CHANGED_SITES=$(echo "$INPUT_SITES" | jq -R -s -c 'split(" ") | map(gsub("^\\s+|\\s+$"; "")) | map(select(length > 0))')
            else
              # List directories, basename, trim
              CHANGED_SITES=$(ls -d sites/*/ 2>/dev/null | xargs -I{} basename {} | jq -R -s -c 'split("\n") | map(gsub("^\\s+|\\s+$"; "")) | map(select(length > 0))')
            fi
          else
            # Push trigger: alleen gewijzigde sites
            # Gebruik git diff en verwijder witruimte met tr
            RAW_SITES=$(git diff --name-only ${{ github.event.before }} ${{ github.event.after }} | grep '^sites/' | cut -d/ -f2 | sort -u | tr -d '\r' | xargs)
            CHANGED_SITES=$(echo "$RAW_SITES" | jq -R -s -c 'split(" ") | map(gsub("^\\s+|\\s+$"; "")) | map(select(length > 0))')
          fi
          
          if [ "$CHANGED_SITES" = "[]" ]; then
            echo "any_changed=false" >> $GITHUB_OUTPUT
          else
            echo "any_changed=true" >> $GITHUB_OUTPUT
            echo "sites=$CHANGED_SITES" >> $GITHUB_OUTPUT
          fi
          echo "Gevonden sites: $CHANGED_SITES"

  # STAP 2: Publiceer elke site parallel via een matrix
  publish:
    needs: discovery
    if: needs.discovery.outputs.any_changed == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        site: ${{ fromJson(needs.discovery.outputs.sites) }}
      fail-fast: false # Laat andere sites doorgaan als één faalt
    
    steps:
      - name: 🛰️ Checkout Monorepo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Volledige history nodig voor subtree split
          token: ${{ secrets.ATHENA_DEPLOY_TOKEN || secrets.GITHUB_TOKEN }}

      - name: 🛠️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 📦 Setup pnpm & Cache
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
          run_install: false

      - name: 💾 Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: ⚡ Cache pnpm modules
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: 🏗️ Build Site
        run: |
          cd "sites/${{ matrix.site }}"
          pnpm install --no-frozen-lockfile
          pnpm build

      - name: 🚦 Optional Lighthouse Audit
        # Draai alleen als aangevinkt bij manual run OF als "[audit]" in commit bericht staat
        if: ${{ github.event.inputs.run_audit == 'true' || contains(github.event.head_commit.message, '[audit]') }}
        run: |
          npm install -g @lhci/cli@0.13.x
          cd "sites/${{ matrix.site }}"
          cat <<EOF > lighthouserc.json
          {
            "ci": {
              "collect": { "staticDistDir": "./dist" },
              "assert": { "preset": "lighthouse:recommended" }
            }
          }
          EOF
          lhci collect --static-dist-dir=./dist || echo "⚠️ Audit failed"
          lhci assert || echo "⚠️ Metrics low"

      - name: 🚀 Push Subtree to Client Repo
        env:
          GITHUB_TOKEN: ${{ secrets.ATHENA_DEPLOY_TOKEN || secrets.GITHUB_TOKEN }}
          API_TOKEN_GITHUB: ${{ secrets.ATHENA_DEPLOY_TOKEN || secrets.GITHUB_TOKEN }}
          DEFAULT_OWNER: "athena-cms-factory"
        run: |
          SITE="${{ matrix.site }}"
          CURRENT_BRANCH=$(git rev-parse --abbrev-ref HEAD)
          
          # Probeer de specifieke repoUrl uit de site settings te halen
          DEPLOY_CONFIG="sites/$SITE/project-settings/deployment.json"
          TARGET_REPO=""
          
          if [ -f "$DEPLOY_CONFIG" ]; then
            RAW_URL=$(cat "$DEPLOY_CONFIG" | jq -r '.repoUrl' 2>/dev/null || echo "")
            if [[ "$RAW_URL" == *"github.com"* ]]; then
              REPO_PATH=$(echo "$RAW_URL" | sed 's/.*github.com\///' | sed 's/\.git$//')
              TARGET_REPO="$REPO_PATH"
            fi
          fi

          if [ -z "$TARGET_REPO" ]; then
            TARGET_REPO="$DEFAULT_OWNER/$SITE"
          fi

          # Controleer/Maak repo aan
          if ! gh repo view $TARGET_REPO >/dev/null 2>&1; then
            gh repo create "$TARGET_REPO" --public --description "Athena CMS Site: $SITE" || true
          fi

          REMOTE_URL="https://x-access-token:${API_TOKEN_GITHUB}@github.com/${TARGET_REPO}.git"
          
          # Isoleer en push
          SPLIT_SHA=$(git subtree split --prefix=sites/$SITE $CURRENT_BRANCH)
          git push "$REMOTE_URL" "$SPLIT_SHA":refs/heads/main --force
