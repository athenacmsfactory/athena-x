name: 🔱 Athena Monorepo Publisher

on:
  workflow_dispatch:
    inputs:
      sites:
        description: 'Site(s) om te publiceren (spatie-gescheiden, bv. "karel-portfolio-ath"). Leeg = alle sites.'
        required: false
        default: ''
      run_audit:
        description: 'Lighthouse Audit uitvoeren?'
        type: boolean
        default: false
  repository_dispatch:
    types: [publish_from_sheet]
  push:
    paths:
      - 'sites/**'
    branches:
      - main
      - 'feat/**'
      - 'fix/**'

jobs:
  # STAP 1: Detecteer welke sites gewijzigd zijn
  discovery:
    runs-on: ubuntu-latest
    outputs:
      sites: ${{ steps.set-sites.outputs.sites }}
      any_changed: ${{ steps.set-sites.outputs.any_changed }}
    steps:
      - name: 🛰️ Checkout Monorepo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.ATHENA_DEPLOY_TOKEN || secrets.GITHUB_TOKEN }}

      - name: 🔄 Sync from Google Sheets (if Dispatch)
        if: github.event_name == 'repository_dispatch' && github.event.action == 'publish_from_sheet'
        run: |
          SITE="${{ github.event.client_payload.site }}"
          echo "Syncing data for $SITE from Google Sheets..."
          cd "sites/$SITE"
          npm install -g pnpm
          pnpm install --no-frozen-lockfile
          pnpm fetch-data
          
          git config --global user.name "Athena Bot"
          git config --global user.email "bot@athena-cms.nl"
          git add src/data/*.json
          if git commit -m "chore(data): sync $SITE from sheets [skip ci]"; then
            # Push naar de branch waar de dispatch vandaan kwam (meestal main)
            git push origin ${{ github.ref_name }}
          fi

      - name: 🔍 Detect Changed Sites
        id: set-sites
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            SITE="${{ github.event.client_payload.site }}"
            CHANGED_SITES="[\"$SITE\"]"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            INPUT_SITES="${{ github.event.inputs.sites }}"
            if [ -n "$INPUT_SITES" ]; then
              CHANGED_SITES=$(echo "$INPUT_SITES" | jq -R -s -c 'split(" ") | map(gsub("^\\s+|\\s+$"; "")) | map(select(length > 0))')
            else
              CHANGED_SITES=$(ls -d sites/*/ 2>/dev/null | xargs -I{} basename {} | jq -R -s -c 'split("\n") | map(gsub("^\\s+|\\s+$"; "")) | map(select(length > 0))')
            fi
          else
            BEFORE="${{ github.event.before }}"
            if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
              BEFORE="HEAD~1"
            fi
            # We vergelijken met de basis van de huidige push
            RAW_SITES=$(git diff --name-only "$BEFORE" ${{ github.event.after }} | grep '^sites/' | cut -d/ -f2 | sort -u | tr -d '\r' | xargs)
            CHANGED_SITES=$(echo "$RAW_SITES" | jq -R -s -c 'split(" ") | map(gsub("^\\s+|\\s+$"; "")) | map(select(length > 0))')
          fi
          
          if [ "$CHANGED_SITES" = "[]" ] || [ -z "$CHANGED_SITES" ]; then
            echo "any_changed=false" >> $GITHUB_OUTPUT
          else
            echo "any_changed=true" >> $GITHUB_OUTPUT
            echo "sites=$CHANGED_SITES" >> $GITHUB_OUTPUT
          fi
          echo "Gevonden sites: $CHANGED_SITES"

  # STAP 2: Publiceer elke site parallel via een matrix
  publish:
    needs: discovery
    if: needs.discovery.outputs.any_changed == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        site: ${{ fromJson(needs.discovery.outputs.sites) }}
      fail-fast: false
    
    steps:
      - name: 🛰️ Checkout Monorepo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.ATHENA_DEPLOY_TOKEN || secrets.GITHUB_TOKEN }}

      - name: 🏗️ Setup Enviroment
        run: |
          echo "CURRENT_BRANCH=${{ github.ref_name }}" >> $GITHUB_ENV

      - name: 🚀 Push Subtree to Client Repo
        env:
          GITHUB_TOKEN: ${{ secrets.ATHENA_DEPLOY_TOKEN || secrets.GITHUB_TOKEN }}
          API_TOKEN_GITHUB: ${{ secrets.ATHENA_DEPLOY_TOKEN || secrets.GITHUB_TOKEN }}
          DEFAULT_OWNER: "athena-cms-factory"
        run: |
          SITE="${{ matrix.site }}"
          BRANCH="${{ github.ref_name }}"
          
          # Probeer de specifieke repoUrl uit de site settings te halen
          DEPLOY_CONFIG="sites/$SITE/project-settings/deployment.json"
          TARGET_REPO=""
          
          if [ -f "$DEPLOY_CONFIG" ]; then
            RAW_URL=$(cat "$DEPLOY_CONFIG" | jq -r '.repoUrl' 2>/dev/null || echo "")
            if [[ "$RAW_URL" == *"github.com"* ]]; then
              REPO_PATH=$(echo "$RAW_URL" | sed 's/.*github.com\///' | sed 's/\.git$//')
              TARGET_REPO="$REPO_PATH"
            fi
          fi

          if [ -z "$TARGET_REPO" ]; then
            TARGET_REPO="$DEFAULT_OWNER/$SITE"
          fi

          REMOTE_URL="https://x-access-token:${API_TOKEN_GITHUB}@github.com/${TARGET_REPO}.git"
          
          # Isoleer en push naar DEZELFDE branch op de target repo
          # (behalve voor main, dat blijft de standaard)
          SPLIT_SHA=$(git subtree split --prefix=sites/$SITE $BRANCH)

          if [ "$BRANCH" = "main" ]; then
            git push "$REMOTE_URL" "$SPLIT_SHA":refs/heads/main --force
          else
            # MULTIVERSE: Push naar 'preview' slot op de target repo
            # Dit triggert de 'deploy.yml' op de target repo (indien aanwezig)
            # Of we kunnen hier direct naar gh-pages/preview pushen.
            git push "$REMOTE_URL" "$SPLIT_SHA":refs/heads/$BRANCH --force
          fi
